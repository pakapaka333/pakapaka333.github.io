<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Page</title>
<!-- Apply stored theme before render to prevent flash -->
<script>
  (function(){
    var s=localStorage.getItem('theme');
    if(!s){s=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
    document.documentElement.setAttribute('data-theme',s);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<!-- en/ subdir: override image paths to point up one level -->
<style>
  .header-bg    { background-image: url('../figures/header.jpg'); }
  .face-photo   { background-image: url('../figures/face_picture_trimmed.png'); }
</style>
</head>
<body>

<!-- Fixed controls -->
<div class="fixed-controls">
  <nav class="lang-switch" aria-label="Language switch">
    <a class="lang-btn" href="../">JA</a>
    <span class="lang-btn active">EN</span>
  </nav>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
</div>

<!-- BibTeX Modal -->
<div class="modal-overlay" id="bibtexModal" onclick="closeBibtexModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">BibTeX</span>
      <button class="modal-close" onclick="document.getElementById('bibtexModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body"><pre class="bibtex-code" id="bibtexContent"></pre></div>
    <div class="modal-footer">
      <button class="copy-btn" id="copyBtn" onclick="copyBibtex()">Copy</button>
    </div>
  </div>
</div>

<!-- Header -->
<header class="header-wrap">
  <div class="header-bg-fallback"></div>
  <div class="header-bg"></div>
  <div class="header-content">
    <div class="face-photo" role="img" aria-label="Profile photo"></div>
    <div class="header-name">
      <h1><span id="profileNameMain">…</span><span class="name-sub" id="profileNameSub"></span></h1>
      <div class="affiliation" id="profileAffiliations"></div>
      <div class="header-sns" id="profileSns"></div>
    </div>
    <div class="header-recent-wrap">
      <span class="recent-label" id="recentLabelEl"></span>
      <div class="header-recent" id="qrContainer"></div>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main" id="mainContent">
  <p style="text-align:center;color:var(--muted);padding:48px 0;">Loading…</p>
</main>

<script src="../js/lang/en.js"></script>
<script src="../js/app.js"></script>
<script>initPage('en', '../');</script>
</body>
</html>
